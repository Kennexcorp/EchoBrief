name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Test with coverage gate
        run: uv run pytest --cov=core --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        run: |
          version="$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)"
          tag_version="${GITHUB_REF_NAME#v}"
          base_version="${tag_version%%-*}"   # drop any pre-release suffix, e.g. -rc1
          if [ "$base_version" != "$version" ]; then
            echo "Tag ${GITHUB_REF_NAME} (base ${base_version}) does not match pyproject version ${version}." >&2
            echo "Bump 'version' in pyproject.toml to match the tag before releasing." >&2
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # latest and the {{major}}.{{minor}} line are applied only to stable
          # tags — metadata-action skips them for pre-releases (e.g. v0.1.0-rc1).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Add linux/arm64 here for Apple Silicon pulls (needs QEMU + slower emulated build):
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease=""
          case "$GITHUB_REF_NAME" in *-*) prerelease="--prerelease" ;; esac
          gh release create "$GITHUB_REF_NAME" --generate-notes $prerelease
